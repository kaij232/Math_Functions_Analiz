<html>
	
	<head><title>Enter Equation</title></head>
	
	<body>
		<h1 align="center"><b>Enter Equation</b></h1>
		<br/>
		<form action="../EquationGraphic" method="get">
			<div align="center">
			<input type="text" name="EquationForGraphic" on/>
			<br/>
			<div align="center">
				Line size
			</div>
			<br/>
			<input type="range" max="10" min="1" value="2" name="EquationForGraphicSize">
			<br/>
			<div align="center">
				Center coordinates:
			</div>
			<br/>
			<div align="center">
				X:
			</div>
			<input type="text" name="CenterCoordinateX" value="0" align="center">
			<br/>
			
			<div align="center">
				Y:
			</div>
			<input type="text" name="CenterCoordinateY" value="0" align="center">
			<br/>
			<span align="center">
				Scale(1 ed = ...):
			</span>
			<input type="text" name="Scale" value="1" align="center">
			<br/>
			<input type="submit" value="Submit"/></div>
			
		</form>
		<a href="../choisToolPage.html"> Return</a> 
	</body>
</html>
